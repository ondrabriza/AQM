[env:custom_esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf

; --- Flash & PSRAM Settings for N16R8 ---
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.partitions = partitions.csv
build_flags = 
    -D BOARD_HAS_PSRAM

; --- OTA Upload Settings via mDNS ---
; Comment out these two lines for the very first USB flash.
; Uncomment them for wireless OTA flashing.
upload_protocol = custom
upload_command = curl -X POST --data-binary @"$SOURCE" http://aqm.local/update